# PostgreSQL Database Configurations (use environment variables for production)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and SQL Initializations
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.jpa.show-sql=false

# Spring AI - Groq configurations (via OpenAI chat client)
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# Spring AI - Jina AI Embeddings for production
spring.ai.openai.embedding.api-key=${JINA_API_KEY}
spring.ai.openai.embedding.base-url=https://api.jina.ai
spring.ai.openai.embedding.options.model=jina-embeddings-v2-base-en

# Spring AI - Qdrant Cloud
spring.ai.vectorstore.qdrant.host=${QDRANT_CLOUD_HOST}
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.api-key=${QDRANT_API_KEY}
spring.ai.vectorstore.qdrant.collection-name=nexus-docs
spring.ai.vectorstore.qdrant.initialize-schema=true

# Spring AI - JDBC Chat Memory
spring.ai.chat.memory.repository.jdbc.initialize-schema=always

# Multipart
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Custom Security
nexus.jwt.secret=${JWT_SECRET}
nexus.jwt.expiration-ms=3600000
nexus.jwt.refresh-expiration-ms=86400000

# Logging
logging.level.org.springframework.security=WARN
logging.level.org.springframework.ai=INFO
logging.level.com.nexus=INFO
