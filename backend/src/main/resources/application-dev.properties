# PostgreSQL Database Configurations
spring.datasource.url=jdbc:postgresql://localhost:5432/nexus
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and SQL Initializations
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring AI - Groq configurations (via OpenAI chat client)
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# Spring AI - Jina AI configurations (via OpenAI embedding client override)
spring.ai.openai.embedding.api-key=${JINA_API_KEY}
spring.ai.openai.embedding.base-url=https://api.jina.ai
spring.ai.openai.embedding.options.model=jina-embeddings-v2-base-en

# Spring AI - Qdrant Vector Store
spring.ai.vectorstore.qdrant.host=${QDRANT_HOST}
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=nexus-docs
spring.ai.vectorstore.qdrant.initialize-schema=true

# Spring AI - JDBC Chat Memory Configuration
spring.ai.chat.memory.repository.jdbc.initialize-schema=always

# Multipart File Upload Configurations
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Custom Security Configurations (JWT keys, expiration times)
# 256-bit AES key hex encoded
nexus.jwt.secret=${JWT_SECRET}
nexus.jwt.expiration-ms=3600000
nexus.jwt.refresh-expiration-ms=86400000

# Logging configurations
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.com.nexus=DEBUG
